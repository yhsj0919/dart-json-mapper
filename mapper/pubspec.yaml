name: dart_json_mapper
version: 2.2.20
description: >
  This package allows programmers to annotate Dart objects in order to
  serialize / deserialize them from / to JSON.
homepage: https://github.com/k-paxian/dart-json-mapper
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  analyzer: ^10.2.0
  build: ^4.0.5
  build_config: ^1.3.0
  intl: ^0.20.2
  meta: ^1.18.2
  path: ^1.9.1
  reflectable: ^5.2.1
  collection: ^1.19.1
  pubspec_parse: ^1.5.0
dev_dependencies:
  lints:
  build_runner:
  reflectable_builder: ^1.2.1
